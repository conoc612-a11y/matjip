<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맛집 탐방 — 메인</title>
  <!-- 네이버 지도 v3 (ncpKeyId 방식). 인증은 등록된 도메인(https://conoc612-a11y.github.io)에서만 성공 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=kw4t9xfkhz&submodules=geocoder"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg:#f4f5f7; --card:#fff; --line:#e6e8eb; --text:#1c1e21; --muted:#8a9099; --accent:#e8590c; --ok:#2f9e44; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
      background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:1000; }
    header h1 { font-size:18px; margin:0; }
    header .right { font-size:13px; color:var(--muted); display:flex; gap:10px; align-items:center; }
    header a, header button { color:var(--accent); background:none; border:none; cursor:pointer; font:inherit; text-decoration:none; }
    .layout { display:flex; flex-wrap:wrap; }
    #map { flex:1 1 380px; height:60vh; min-height:360px; }
    .panel { flex:1 1 320px; max-height:60vh; overflow-y:auto; padding:12px 16px; }
    .layer-toggle { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text);
      background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 12px; margin-bottom:12px; cursor:pointer; }
    .layer-toggle input { accent-color:var(--accent); width:16px; height:16px; }
    .banner { background:#fff4e6; border:1px solid #ffd8a8; color:#a85; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:12px; }
    .banner a { color:var(--accent); font-weight:600; }
    .search-inp { width:100%; font:inherit; padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:12px; }
    .search-inp:focus { outline:2px solid var(--accent); border-color:var(--accent); }
    .kakao-btn { width:100%; font:inherit; padding:9px; border:1px solid var(--accent); color:var(--accent); background:#fff; border-radius:8px; cursor:pointer; margin-bottom:12px; }
    .kakao-btn:hover { background:var(--accent); color:#fff; }
    .kakao-back { background:none; border:none; color:var(--accent); cursor:pointer; font:inherit; padding:2px 0 10px; }
    .rec { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .rec:hover { border-color:var(--accent); }
    .rec h3 { margin:0 0 4px; font-size:16px; }
    .rec .meta { font-size:12px; color:var(--muted); }
    .rec .tags { margin:8px 0; display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:11px; background:#f1f3f5; border-radius:12px; padding:3px 9px; }
    .tag.hit { background:var(--accent); color:#fff; }
    .rec .why { font-size:12px; color:var(--ok); margin:6px 0; min-height:15px; }
    .rec .actions { display:flex; gap:8px; margin-top:8px; }
    .rec .actions a, .rec .actions button { font-size:13px; padding:6px 10px; border-radius:7px; border:1px solid var(--line); cursor:pointer; background:#fff; color:var(--text); text-decoration:none; }
    .rec .actions .save { background:var(--accent); color:#fff; border:none; }
    .score { float:right; font-size:12px; color:var(--accent); font-weight:700; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" style="text-decoration:none;color:inherit;"><h1 style="cursor:pointer;">맛집 탐방 🍜</h1></a>
    <div class="right">
      <span id="who"></span>
      <a href="ai.html">🤖 AI 추천</a>
      <a href="land.html">🗺️ 토지지도</a>
      <a href="onboarding.html" id="taste-link">취향 설정</a>
      <button id="logout" style="display:none;">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <div id="map"></div>
    <div class="panel">
      <input type="text" id="search" class="search-inp" placeholder="🔍 식당 이름·태그 검색" autocomplete="off" />
      <button id="geo-btn" class="kakao-btn">📍 내 위치에서 찾기</button>
      <button id="kakao-btn" class="kakao-btn">🔎 카카오에서 실제 식당 검색</button>
      <div class="banner" id="banner"></div>
      <div id="rec-list"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bhgijvaxxjnocgfnaaeu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_rYaGd3kk5UuFBe3TSpFA8g_uGHWwkqM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);

    // 네이버 지도 인증 실패 시(도메인 미등록/키 오류) 조용히 죽지 않고 안내 ──
    window.navermap_authFailure = function () {
      const b = $('banner');
      if (b) b.innerHTML = '⚠️ 네이버 지도 인증 실패 — NCP 콘솔의 Web 서비스 URL에 <b>https://conoc612-a11y.github.io</b> 가 등록됐는지 확인해 주세요.';
    };

    // ── 카카오 실시간 장소검색 (지도 SDK · services.Places) ──
    const KAKAO_JS_KEY = '725e7ddf965a3ffff3da1f2ac771cc57'; // developers.kakao.com JavaScript 키. 비우면 버튼 숨김.
    let kakaoReady = false, kakaoMarkers = [];
    if (KAKAO_JS_KEY) {
      const ks = document.createElement('script');
      ks.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&libraries=services&autoload=false`;
      ks.onload = () => window.kakao && kakao.maps.load(() => { kakaoReady = true; });
      document.head.appendChild(ks);
    }
    function clearKakaoMarkers() { kakaoMarkers.forEach((m) => m.setMap(null)); kakaoMarkers = []; }

    // ── 네이버 지도 초기화 (서울 중심) ──
    const map = new naver.maps.Map('map', {
      center: new naver.maps.LatLng(37.5665, 126.9780),
      zoom: 12,
      // [Map Style] 지도 유형 전환 컨트롤(일반/위성/지형/하이브리드). 커스텀 스타일은
      // 콘솔 Map Style Editor에서 스타일 ID를 만든 뒤 customStyleId 옵션으로 교체 가능.
      mapTypeControl: true,
      mapTypeControlOptions: { style: naver.maps.MapTypeControlStyle.BUTTON, position: naver.maps.Position.TOP_RIGHT },
    });
    // 공통 InfoWindow(팝업) 하나 재사용
    const infoWindow = new naver.maps.InfoWindow({ borderWidth: 1, borderColor: '#e6e8eb', anchorSize: new naver.maps.Size(0, 0) });
    function openInfo(marker, html) { infoWindow.setContent(`<div style="padding:7px 11px;font-size:13px;line-height:1.4;">${html}</div>`); infoWindow.open(map, marker); }

    // ── [Reverse Geocoding] 좌표 → 주소 (네이버 geocoder 서브모듈, 브라우저 안전) ──
    function showAddress(coord, label) {
      if (!(naver.maps.Service && naver.maps.Service.reverseGeocode)) return;
      naver.maps.Service.reverseGeocode({
        coords: coord,
        orders: [naver.maps.Service.OrderType.ROAD_ADDR, naver.maps.Service.OrderType.ADDR].join(','),
      }, (status, res) => {
        if (status !== naver.maps.Service.Status.OK) { openInfo(coord, `${label} 주소를 못 찾았어요`); return; }
        const a = res.v2.address;
        const addr = a.roadAddress || a.jibunAddress || '(주소 정보 없음)';
        openInfo(coord, `${label}<br><b>${esc(addr)}</b>`);
      });
    }
    // 지도를 클릭하면 그 지점의 주소를 표시
    naver.maps.Event.addListener(map, 'click', (e) => showAddress(e.coord, '📍 클릭한 위치'));
    // 📍 내 위치에서 찾기 (GPS → 지도 이동 → 주소 표시)
    $('geo-btn').addEventListener('click', () => {
      if (!navigator.geolocation) { alert('이 브라우저는 위치를 지원하지 않아요.'); return; }
      $('geo-btn').textContent = '위치 찾는 중…'; $('geo-btn').disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          $('geo-btn').textContent = '📍 내 위치에서 찾기'; $('geo-btn').disabled = false;
          const ll = latLng(pos.coords.latitude, pos.coords.longitude);
          map.setCenter(ll); map.setZoom(15); showAddress(ll, '📍 내 위치');
        },
        () => { $('geo-btn').textContent = '📍 내 위치에서 찾기'; $('geo-btn').disabled = false; alert('위치 권한이 필요해요.'); }
      );
    });

    // 토지·규제 레이어(용도지역/지적/그린벨트 등)는 네이버 v3가 정부 WMS 오버레이를
    // 지원하지 않아 별도 페이지 land.html(Leaflet + V-World)에서 제공한다. 헤더의 '토지지도' 링크.

    const markers = {}; // id -> naver.maps.Marker
    let restaurants = [];
    let taste = null;
    let user = null;
    let query = '';

    function latLng(lat, lng) { return new naver.maps.LatLng(Number(lat), Number(lng)); }
    // 여러 좌표에 맞춰 지도 이동 (1개면 확대, 여러 개면 영역에 맞춤)
    function fitToPoints(pts) {
      if (!pts.length) return;
      if (pts.length === 1) { map.setCenter(latLng(pts[0][0], pts[0][1])); map.setZoom(16); return; }
      const lats = pts.map((p) => p[0]), lngs = pts.map((p) => p[1]);
      const sw = latLng(Math.min(...lats), Math.min(...lngs));
      const ne = latLng(Math.max(...lats), Math.max(...lngs));
      map.fitBounds(new naver.maps.LatLngBounds(sw, ne));
    }

    // ── 규칙기반 추천 점수 ──
    function score(r) {
      if (!taste) return { score: 0, hits: [] };
      const want = new Set([...(taste.flavor_tags || []), ...(taste.situation_tags || [])]);
      const hits = [];
      let s = 0;
      (r.tags || []).forEach((t) => { if (want.has(t)) { s += 2; hits.push(t); } });
      const spicy = taste.spicy_level ?? 2;
      if (spicy >= 3 && (r.tags || []).includes('매콤') && !hits.includes('매콤')) { s += 2; hits.push('매콤'); }
      if (spicy <= 1 && (r.tags || []).includes('담백') && !hits.includes('담백')) { s += 2; hits.push('담백'); }
      return { score: s, hits };
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    function render() {
      const q = (query || '').trim().toLowerCase();
      const base = q
        ? restaurants.filter((r) => `${r.name} ${r.category || ''} ${(r.tags || []).join(' ')}`.toLowerCase().includes(q))
        : restaurants;
      const scored = base
        .map((r) => ({ r, ...score(r) }))
        .sort((a, b) => b.score - a.score || a.r.name.localeCompare(b.r.name));

      // 배너
      if (!user) {
        $('banner').innerHTML = '로그인하면 취향 기반 추천을 받을 수 있어요. <a href="onboarding.html">로그인/회원가입 →</a>';
      } else if (!taste) {
        $('banner').innerHTML = '아직 취향 정보가 없어요. <a href="onboarding.html">취향 입력하러 가기 →</a>';
      } else {
        $('banner').textContent = `${user.email} 님의 취향(매운맛 ${taste.spicy_level}/5) 기준 추천입니다.`;
      }

      // 리스트
      $('rec-list').innerHTML = scored.map(({ r, score, hits }) => {
        const tagsHtml = (r.tags || []).map((t) =>
          `<span class="tag${hits.includes(t) ? ' hit' : ''}">${esc(t)}</span>`).join('');
        const why = taste
          ? (hits.length ? `취향 일치: ${hits.join(', ')}` : '취향과 겹치는 태그 없음')
          : '';
        return `<div class="rec" data-id="${r.id}">
          ${taste ? `<span class="score">${score}점</span>` : ''}
          <h3>${esc(r.name)}</h3>
          <div class="meta">${esc(r.category || '')} · ${esc(r.address || '')}</div>
          <div class="tags">${tagsHtml}</div>
          <div class="why">${esc(why)}</div>
          <div class="actions">
            <button class="save" data-id="${r.id}">저장</button>
            <a href="detail.html?id=${r.id}">상세 · 길찾기</a>
          </div>
        </div>`;
      }).join('');
      if (!scored.length) $('rec-list').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px 0;">검색 결과가 없어요.</div>';

      // 마커 (네이버)
      Object.values(markers).forEach((m) => m.setMap(null));
      clearKakaoMarkers();
      const pts = [];
      scored.forEach(({ r }) => {
        if (r.lat == null || r.lng == null) return;
        const m = new naver.maps.Marker({ position: latLng(r.lat, r.lng), map, title: r.name });
        naver.maps.Event.addListener(m, 'click', () => openInfo(m, `<b>${esc(r.name)}</b><br>${esc(r.category || '')}`));
        markers[r.id] = m;
        pts.push([Number(r.lat), Number(r.lng)]);
      });
      // 검색 중이면 결과 위치로 지도 이동
      if (q && pts.length) {
        fitToPoints(pts);
        if (pts.length === 1) openInfo(markers[scored[0].r.id], `<b>${esc(scored[0].r.name)}</b>`);
      }

      // 리스트 클릭 → 지도 이동 / 저장
      $('rec-list').querySelectorAll('.rec').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.actions')) return;
          const r = restaurants.find((x) => x.id == card.dataset.id);
          if (r && r.lat != null) { map.setCenter(latLng(r.lat, r.lng)); map.setZoom(15); if (markers[r.id]) openInfo(markers[r.id], `<b>${esc(r.name)}</b><br>${esc(r.category || '')}`); }
        });
      });
      $('rec-list').querySelectorAll('.save').forEach((btn) => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!user) { alert('로그인 후 저장할 수 있어요.'); location.href = 'onboarding.html'; return; }
          btn.disabled = true;
          const { error } = await sb.from('saved_restaurants')
            .upsert({ user_id: user.id, restaurant_id: Number(btn.dataset.id) }, { onConflict: 'user_id,restaurant_id' });
          btn.textContent = error ? '실패' : '저장됨 ✓';
          if (!error) btn.style.background = 'var(--ok)';
        });
      });
    }

    // ── 데이터 로드 ──
    async function loadAll() {
      const { data: { session } } = await sb.auth.getSession();
      user = session ? session.user : null;
      if (user) {
        $('who').textContent = user.email;
        $('logout').style.display = '';
        const { data: t } = await sb.from('taste_profiles').select('*').eq('user_id', user.id).maybeSingle();
        taste = t || null;
      }
      const { data: rs, error } = await sb.from('mj_restaurants').select('*');
      if (error) { $('banner').textContent = '맛집을 불러오지 못했어요: ' + error.message; return; }
      restaurants = rs || [];
      render();
    }

    $('logout').addEventListener('click', async () => { await sb.auth.signOut(); location.href = 'index.html'; });
    $('search').addEventListener('input', (e) => { query = e.target.value; render(); });

    // ── 카카오 검색 ──
    if (!KAKAO_JS_KEY) $('kakao-btn').style.display = 'none';
    $('kakao-btn').addEventListener('click', runKakaoSearch);

    function runKakaoSearch() {
      const q = $('search').value.trim();
      if (!q) { alert('검색어를 입력해 주세요.'); return; }
      if (!kakaoReady) { alert('장소검색 로딩 중… 잠시 후 다시 눌러 주세요.'); return; }
      $('kakao-btn').disabled = true;
      $('kakao-btn').textContent = '검색 중…';
      const ps = new kakao.maps.services.Places();
      ps.keywordSearch(q, (data, status) => {
        $('kakao-btn').disabled = false;
        $('kakao-btn').textContent = '🔎 카카오에서 실제 식당 검색';
        renderKakao(status === kakao.maps.services.Status.OK ? data : []);
      }, { category_group_code: 'FD6', size: 15 });
    }

    function renderKakao(data) {
      Object.values(markers).forEach((m) => m.setMap(null));
      clearKakaoMarkers();
      const back = '<button class="kakao-back" id="kakao-back">← 추천 목록으로</button>';
      if (!data.length) {
        $('rec-list').innerHTML = back + '<div style="text-align:center;color:var(--muted);padding:24px 0;">카카오 검색 결과가 없어요.</div>';
        $('kakao-back').addEventListener('click', render); return;
      }
      $('rec-list').innerHTML = back + data.map((p, i) => `
        <div class="rec" data-i="${i}">
          <h3>${esc(p.place_name)}</h3>
          <div class="meta">${esc((p.category_name || '').split('>').pop().trim())} · ${esc(p.road_address_name || p.address_name || '')}</div>
          <div class="actions">
            <button class="save ksave" data-i="${i}">내 목록에 저장</button>
            ${p.place_url ? `<a href="${p.place_url}" target="_blank" rel="noopener">카카오맵</a>` : ''}
          </div>
        </div>`).join('');
      const pts = [];
      data.forEach((p) => {
        const m = new naver.maps.Marker({ position: latLng(p.y, p.x), map, title: p.place_name });
        naver.maps.Event.addListener(m, 'click', () => openInfo(m, `<b>${esc(p.place_name)}</b>`));
        kakaoMarkers.push(m); pts.push([Number(p.y), Number(p.x)]);
      });
      fitToPoints(pts);
      $('kakao-back').addEventListener('click', render);
      $('rec-list').querySelectorAll('.rec').forEach((card) => card.addEventListener('click', (e) => {
        if (e.target.closest('.actions')) return;
        const p = data[Number(card.dataset.i)]; map.setCenter(latLng(p.y, p.x)); map.setZoom(16);
      }));
      $('rec-list').querySelectorAll('.ksave').forEach((btn) => btn.addEventListener('click', (e) => {
        e.stopPropagation(); saveKakaoPlace(data[Number(btn.dataset.i)], btn);
      }));
    }

    async function saveKakaoPlace(p, btn) {
      if (!user) { alert('로그인 후 저장할 수 있어요.'); location.href = 'onboarding.html'; return; }
      btn.disabled = true; btn.textContent = '저장 중…';
      const { data: found } = await sb.from('mj_restaurants').select('id').eq('name', p.place_name).limit(1);
      let rid = found && found[0] && found[0].id;
      if (!rid) {
        const { data: ins, error } = await sb.from('mj_restaurants').insert({
          name: p.place_name, address: p.road_address_name || p.address_name || null,
          lat: Number(p.y), lng: Number(p.x),
          category: (p.category_name || '').split('>').pop().trim() || null, tags: []
        }).select('id').single();
        if (error) { btn.disabled = false; btn.textContent = '실패'; return; }
        rid = ins.id;
      }
      const { error: se } = await sb.from('saved_restaurants').upsert({ user_id: user.id, restaurant_id: rid }, { onConflict: 'user_id,restaurant_id' });
      btn.textContent = se ? '실패' : '저장됨 ✓';
      if (!se) { btn.style.background = 'var(--ok)'; const { data: rs } = await sb.from('mj_restaurants').select('*'); if (rs) restaurants = rs; }
    }

    loadAll();
  </script>
</body>
</html>

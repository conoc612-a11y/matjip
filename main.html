<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맛집 탐방 — 메인</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg:#f4f5f7; --card:#fff; --line:#e6e8eb; --text:#1c1e21; --muted:#8a9099; --accent:#e8590c; --ok:#2f9e44; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
      background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:1000; }
    header h1 { font-size:18px; margin:0; }
    header .right { font-size:13px; color:var(--muted); display:flex; gap:10px; align-items:center; }
    header a, header button { color:var(--accent); background:none; border:none; cursor:pointer; font:inherit; text-decoration:none; }
    .layout { display:flex; flex-wrap:wrap; }
    #map { flex:1 1 380px; height:60vh; min-height:360px; }
    .panel { flex:1 1 320px; max-height:60vh; overflow-y:auto; padding:12px 16px; }
    .banner { background:#fff4e6; border:1px solid #ffd8a8; color:#a85; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:12px; }
    .banner a { color:var(--accent); font-weight:600; }
    .rec { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; }
    .rec:hover { border-color:var(--accent); }
    .rec h3 { margin:0 0 4px; font-size:16px; }
    .rec .meta { font-size:12px; color:var(--muted); }
    .rec .tags { margin:8px 0; display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:11px; background:#f1f3f5; border-radius:12px; padding:3px 9px; }
    .tag.hit { background:var(--accent); color:#fff; }
    .rec .why { font-size:12px; color:var(--ok); margin:6px 0; min-height:15px; }
    .rec .actions { display:flex; gap:8px; margin-top:8px; }
    .rec .actions a, .rec .actions button { font-size:13px; padding:6px 10px; border-radius:7px; border:1px solid var(--line); cursor:pointer; background:#fff; color:var(--text); text-decoration:none; }
    .rec .actions .save { background:var(--accent); color:#fff; border:none; }
    .score { float:right; font-size:12px; color:var(--accent); font-weight:700; }
  </style>
</head>
<body>
  <header>
    <h1>맛집 탐방 🍜</h1>
    <div class="right">
      <span id="who"></span>
      <a href="onboarding.html" id="taste-link">취향 설정</a>
      <button id="logout" style="display:none;">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <div id="map"></div>
    <div class="panel">
      <div class="banner" id="banner"></div>
      <div id="rec-list"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bhgijvaxxjnocgfnaaeu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_rYaGd3kk5UuFBe3TSpFA8g_uGHWwkqM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);

    // ── V-World 인증키: 발급받으면 아래에 넣으세요. 비어 있으면 OSM 지도로 자동 대체 ──
    const VWORLD_KEY = '';

    // ── 지도 초기화 (서울 중심) ──
    const map = L.map('map').setView([37.5665, 126.9780], 12);
    if (VWORLD_KEY) {
      L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Base/{z}/{y}/{x}.png`,
        { maxZoom: 19, attribution: '© VWorld' }).addTo(map);
    } else {
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { maxZoom: 19, attribution: '© OpenStreetMap (V-World 키 넣으면 교체)' }).addTo(map);
    }

    const markers = {}; // id -> marker
    let restaurants = [];
    let taste = null;
    let user = null;

    // ── 규칙기반 추천 점수 ──
    function score(r) {
      if (!taste) return { score: 0, hits: [] };
      const want = new Set([...(taste.flavor_tags || []), ...(taste.situation_tags || [])]);
      const hits = [];
      let s = 0;
      (r.tags || []).forEach((t) => { if (want.has(t)) { s += 2; hits.push(t); } });
      const spicy = taste.spicy_level ?? 2;
      if (spicy >= 3 && (r.tags || []).includes('매콤') && !hits.includes('매콤')) { s += 2; hits.push('매콤'); }
      if (spicy <= 1 && (r.tags || []).includes('담백') && !hits.includes('담백')) { s += 2; hits.push('담백'); }
      return { score: s, hits };
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    function render() {
      const scored = restaurants
        .map((r) => ({ r, ...score(r) }))
        .sort((a, b) => b.score - a.score || a.r.name.localeCompare(b.r.name));

      // 배너
      if (!user) {
        $('banner').innerHTML = '로그인하면 취향 기반 추천을 받을 수 있어요. <a href="onboarding.html">로그인/회원가입 →</a>';
      } else if (!taste) {
        $('banner').innerHTML = '아직 취향 정보가 없어요. <a href="onboarding.html">취향 입력하러 가기 →</a>';
      } else {
        $('banner').textContent = `${user.email} 님의 취향(매운맛 ${taste.spicy_level}/5) 기준 추천입니다.`;
      }

      // 리스트
      $('rec-list').innerHTML = scored.map(({ r, score, hits }) => {
        const tagsHtml = (r.tags || []).map((t) =>
          `<span class="tag${hits.includes(t) ? ' hit' : ''}">${esc(t)}</span>`).join('');
        const why = taste
          ? (hits.length ? `취향 일치: ${hits.join(', ')}` : '취향과 겹치는 태그 없음')
          : '';
        return `<div class="rec" data-id="${r.id}">
          ${taste ? `<span class="score">${score}점</span>` : ''}
          <h3>${esc(r.name)}</h3>
          <div class="meta">${esc(r.category || '')} · ${esc(r.address || '')}</div>
          <div class="tags">${tagsHtml}</div>
          <div class="why">${esc(why)}</div>
          <div class="actions">
            <button class="save" data-id="${r.id}">저장</button>
            <a href="detail.html?id=${r.id}">상세 · 길찾기</a>
          </div>
        </div>`;
      }).join('');

      // 마커
      Object.values(markers).forEach((m) => map.removeLayer(m));
      scored.forEach(({ r }) => {
        if (r.lat == null || r.lng == null) return;
        const m = L.marker([r.lat, r.lng]).addTo(map).bindPopup(`<b>${esc(r.name)}</b><br>${esc(r.category || '')}`);
        markers[r.id] = m;
      });

      // 리스트 클릭 → 지도 이동 / 저장
      $('rec-list').querySelectorAll('.rec').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.actions')) return;
          const r = restaurants.find((x) => x.id == card.dataset.id);
          if (r && r.lat != null) { map.setView([r.lat, r.lng], 15); markers[r.id]?.openPopup(); }
        });
      });
      $('rec-list').querySelectorAll('.save').forEach((btn) => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!user) { alert('로그인 후 저장할 수 있어요.'); location.href = 'onboarding.html'; return; }
          btn.disabled = true;
          const { error } = await sb.from('saved_restaurants')
            .upsert({ user_id: user.id, restaurant_id: Number(btn.dataset.id) }, { onConflict: 'user_id,restaurant_id' });
          btn.textContent = error ? '실패' : '저장됨 ✓';
          if (!error) btn.style.background = 'var(--ok)';
        });
      });
    }

    // ── 데이터 로드 ──
    async function loadAll() {
      const { data: { session } } = await sb.auth.getSession();
      user = session ? session.user : null;
      if (user) {
        $('who').textContent = user.email;
        $('logout').style.display = '';
        const { data: t } = await sb.from('taste_profiles').select('*').eq('user_id', user.id).maybeSingle();
        taste = t || null;
      }
      const { data: rs, error } = await sb.from('mj_restaurants').select('*');
      if (error) { $('banner').textContent = '맛집을 불러오지 못했어요: ' + error.message; return; }
      restaurants = rs || [];
      render();
    }

    $('logout').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

    loadAll();
  </script>
</body>
</html>

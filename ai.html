<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맛집 탐방 — 자연어 추천</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg:#f4f5f7; --card:#fff; --line:#e6e8eb; --text:#1c1e21; --muted:#8a9099; --accent:#e8590c; --ok:#2f9e44; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
      display:flex; justify-content:center; padding:32px 16px; }
    .app { width:100%; max-width:560px; }
    header a { color:var(--accent); text-decoration:none; font-size:14px; }
    h1 { font-size:22px; margin:8px 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin:0 0 18px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
    textarea { width:100%; font:inherit; padding:12px; border:1px solid var(--line); border-radius:8px; resize:vertical; }
    textarea:focus { outline:2px solid var(--accent); border-color:var(--accent); }
    .btn { width:100%; font:inherit; font-weight:600; padding:12px; border:none; border-radius:8px; background:var(--accent); color:#fff; cursor:pointer; margin-top:10px; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .chip { font-size:12px; background:#f1f3f5; border-radius:12px; padding:4px 10px; }
    .ex { font-size:12px; color:var(--muted); margin-top:8px; }
    .ex a { color:var(--accent); cursor:pointer; }
    .rec { border-bottom:1px solid var(--line); padding:10px 0; }
    .rec:last-child { border:none; }
    .rec b { font-size:15px; } .score { float:right; color:var(--accent); font-weight:700; font-size:13px; }
    .why { font-size:12px; color:var(--ok); }
    .note { font-size:12px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <div class="app">
    <header><a href="main.html">← 메인으로</a></header>
    <h1>🤖 자연어로 맛집 찾기</h1>
    <p class="sub">"오늘 뭐 먹고 싶어?"를 문장으로 적으면 취향을 해석해 추천해 드려요.</p>

    <div class="card">
      <textarea id="q" rows="3" placeholder="예: 매운 거 좋아하고 회식 장소 찾고 있어"></textarea>
      <div class="ex">취향으로 추천:
        <a data-ex="담백하고 혼자 조용히 먹고 싶어">담백·혼밥</a> ·
        <a data-ex="매콤한 데이트 코스">매콤·데이트</a> ·
        <a data-ex="단짠 친구모임">단짠·친구</a>
        <br>상호로 찾기:
        <a data-ex="스타벅스 위치 알려줘">스타벅스</a> ·
        <a data-ex="김밥천국 근처">김밥천국</a>
      </div>
      <button class="btn" id="go">추천 받기</button>
    </div>

    <div class="card" id="parsed" style="display:none;">
      <b style="font-size:14px;">이렇게 이해했어요</b>
      <div class="chips" id="parsed-chips"></div>
    </div>

    <div class="card" id="result" style="display:none;"></div>

    <p class="note">※ 취향 키워드(매콤·담백·혼밥 등)가 있으면 DB 추천, 상호/브랜드면 카카오 실시간 장소검색으로 자동 분기합니다. 더 똑똑한 자연어 이해는 실제 LLM(Supabase Edge Function + Claude API)으로 확장 가능해요.</p>
  </div>

  <script>
    const sb = window.supabase.createClient(
      'https://bhgijvaxxjnocgfnaaeu.supabase.co',
      'sb_publishable_rYaGd3kk5UuFBe3TSpFA8g_uGHWwkqM'
    );
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

    // ── 카카오 장소검색 SDK ──
    const KAKAO_JS_KEY = '725e7ddf965a3ffff3da1f2ac771cc57';
    let kakaoReady = false;
    if (KAKAO_JS_KEY) {
      const ks = document.createElement('script');
      ks.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&libraries=services&autoload=false`;
      ks.onload = () => window.kakao && kakao.maps.load(() => { kakaoReady = true; });
      document.head.appendChild(ks);
    }

    // ── 자연어 → 취향 파싱 (키워드 규칙) ──
    function parse(text) {
      const t = text.toLowerCase();
      const flavor = new Set(), situation = new Set();
      let spicy = 2;
      if (/(맵|매콤|얼큰|화끈|불맛)/.test(text)) { flavor.add('매콤'); spicy = 4; }
      if (/(담백|순한|깔끔|안 매)/.test(text)) { flavor.add('담백'); spicy = 1; }
      if (/(단짠|달달|달콤)/.test(text)) { flavor.add(text.includes('단짠') ? '단짠' : '달콤'); }
      if (/(새콤|상큼)/.test(text)) flavor.add('새콤');
      if (/(기름|느끼|고소)/.test(text)) flavor.add('기름진');
      if (/(혼자|혼밥|조용)/.test(text)) situation.add('혼밥');
      if (/(회식|단체|팀)/.test(text)) situation.add('회식');
      if (/(데이트|연인|분위기)/.test(text)) situation.add('데이트');
      if (/(가족|부모|어른)/.test(text)) situation.add('가족모임');
      if (/(친구|모임)/.test(text)) situation.add('친구모임');
      return { spicy_level: spicy, flavor_tags: [...flavor], situation_tags: [...situation] };
    }

    function score(r, taste) {
      const want = new Set([...(taste.flavor_tags||[]), ...(taste.situation_tags||[])]);
      const hits = []; let s = 0;
      (r.tags || []).forEach((x) => { if (want.has(x)) { s += 2; hits.push(x); } });
      const sp = taste.spicy_level ?? 2;
      if (sp >= 3 && (r.tags||[]).includes('매콤') && !hits.includes('매콤')) { s += 2; hits.push('매콤'); }
      if (sp <= 1 && (r.tags||[]).includes('담백') && !hits.includes('담백')) { s += 2; hits.push('담백'); }
      return { score: s, hits };
    }

    // 장소검색용: 문장에서 조사/불용어 제거 → 상호만 남기기
    function cleanQuery(text) {
      return text.replace(/내\s*근처|근처|주변|위치|어디(에|야|인지)?|알려\s*줘|찾아\s*줘|좀|추천\s*해\s*줘|추천|해\s*줘|가고\s*싶어|\?/g, '').trim();
    }

    async function run(text) {
      const taste = parse(text);
      const hasTaste = taste.flavor_tags.length || taste.situation_tags.length;
      if (hasTaste) return recommendByTaste(taste);      // 취향 문장 → DB 추천
      return placeSearch(cleanQuery(text) || text);       // 상호/브랜드 → 카카오 장소검색
    }

    async function recommendByTaste(taste) {
      $('parsed').style.display = 'block';
      $('parsed-chips').innerHTML = `<span class="chip">🍽 취향 추천</span>` +
        `<span class="chip">매운맛 ${taste.spicy_level}/5</span>` +
        taste.flavor_tags.map((t) => `<span class="chip">맛:${esc(t)}</span>`).join('') +
        taste.situation_tags.map((t) => `<span class="chip">상황:${esc(t)}</span>`).join('');
      const { data: rs, error } = await sb.from('mj_restaurants').select('*');
      if (error) { $('result').style.display='block'; $('result').textContent = '조회 실패: ' + error.message; return; }
      const ranked = (rs||[]).map((r) => ({ ...r, ...score(r, taste) }))
        .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name)).slice(0, 5);
      $('result').style.display = 'block';
      $('result').innerHTML = ranked.map((r) =>
        `<div class="rec"><span class="score">${r.score}점</span><b>${esc(r.name)}</b>
         <div style="font-size:12px;color:var(--muted)">${esc(r.category||'')} · ${(r.tags||[]).join(', ')}</div>
         <div class="why">${r.hits.length ? '일치: ' + r.hits.join(', ') : '취향과 겹치는 태그 없음'}</div>
         <a href="detail.html?id=${r.id}" style="font-size:13px;color:var(--accent)">상세 · 길찾기 →</a></div>`
      ).join('');
    }

    function placeSearch(q) {
      $('parsed').style.display = 'block';
      $('parsed-chips').innerHTML = `<span class="chip">🔎 장소검색: ${esc(q)}</span>`;
      $('result').style.display = 'block';
      if (!kakaoReady) { $('result').innerHTML = '<div class="note">장소검색 로딩 중… 잠시 후 다시 시도해 주세요.</div>'; return; }
      const ps = new kakao.maps.services.Places();
      ps.keywordSearch(q, (data, status) => {
        if (status !== kakao.maps.services.Status.OK || !data.length) {
          $('result').innerHTML = '<div class="note">검색 결과가 없어요.</div>'; return;
        }
        $('result').innerHTML = data.slice(0, 8).map((p, i) => `
          <div class="rec" data-i="${i}"><b>${esc(p.place_name)}</b>
            <div style="font-size:12px;color:var(--muted)">${esc((p.category_name||'').split('>').pop().trim())} · ${esc(p.road_address_name || p.address_name || '')}</div>
            <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
              <button class="psave" data-i="${i}" style="font-size:13px;padding:6px 10px;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer;">저장</button>
              ${p.place_url ? `<a href="${p.place_url}" target="_blank" rel="noopener" style="font-size:13px;color:var(--accent);">카카오맵 →</a>` : ''}
            </div>
          </div>`).join('');
        $('result').querySelectorAll('.psave').forEach((btn) =>
          btn.addEventListener('click', () => savePlace(data[Number(btn.dataset.i)], btn)));
      });
    }

    async function savePlace(p, btn) {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { alert('로그인 후 저장할 수 있어요.'); location.href = 'onboarding.html'; return; }
      btn.disabled = true; btn.textContent = '저장 중…';
      const { data: found } = await sb.from('mj_restaurants').select('id').eq('name', p.place_name).limit(1);
      let rid = found && found[0] && found[0].id;
      if (!rid) {
        const { data: ins, error } = await sb.from('mj_restaurants').insert({
          name: p.place_name, address: p.road_address_name || p.address_name || null,
          lat: Number(p.y), lng: Number(p.x),
          category: (p.category_name || '').split('>').pop().trim() || null, tags: []
        }).select('id').single();
        if (error) { btn.disabled = false; btn.textContent = '실패'; return; }
        rid = ins.id;
      }
      const { error: se } = await sb.from('saved_restaurants').upsert({ user_id: user.id, restaurant_id: rid }, { onConflict: 'user_id,restaurant_id' });
      btn.textContent = se ? '실패' : '저장됨 ✓';
      if (!se) btn.style.background = 'var(--ok)';
    }

    $('go').addEventListener('click', () => run($('q').value.trim() || '아무거나'));
    document.querySelectorAll('[data-ex]').forEach((a) =>
      a.addEventListener('click', () => { $('q').value = a.dataset.ex; run(a.dataset.ex); }));
  </script>
</body>
</html>
